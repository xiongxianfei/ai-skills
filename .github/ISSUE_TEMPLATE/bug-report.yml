name: Bug Report
description: Report a problem with an existing skill
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. A useful report includes the smallest input that reproduces
        the problem, the expected behavior, and the actual behavior.

  - type: dropdown
    id: skill
    attributes:
      label: Affected skill or area
      options:
        - editor
        - communicator
        - doctor
        - fitness-coach
        - nvc
        - email-drafter
        - journaling
        - study-planner
        - language-tutor
        - oscp-coach
        - install/docs/repo tooling
        - other
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: What is the smallest prompt or sequence of steps that reproduces the problem?
      placeholder: |
        1. Run `/editor This is my text...`
        2. Observe the second section of the response
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Exact input
      description: Paste the exact user input when possible.
      placeholder: "/editor This is my text..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: output_excerpt
    attributes:
      label: Output excerpt or screenshot
      description: Paste the relevant output, or link a screenshot if the response is too long.
      render: markdown

  - type: dropdown
    id: bug_class
    attributes:
      label: Bug class
      description: Pick the closest category if you can.
      options:
        - trigger / wrong skill invoked
        - prompt instructions unclear or incomplete
        - output format violation
        - safety / policy boundary
        - translation / language quality
        - metadata / frontmatter
        - docs / installation mismatch
        - other

  - type: dropdown
    id: model
    attributes:
      label: AI model used
      options:
        - Claude (Claude Code)
        - ChatGPT
        - Gemini
        - Other
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Include frequency, workarounds, or why this matters if relevant.
