name: Bug Report
description: Report a problem with an existing skill
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide as much detail as possible.

  - type: dropdown
    id: skill
    attributes:
      label: Affected skill
      options:
        - editor
        - communicator
        - doctor
        - fitness-coach
        - nvc
        - other
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Input you provided
      description: What did you type after the slash command?
      placeholder: "/editor This is my text..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: model
    attributes:
      label: AI model used
      options:
        - Claude (Claude Code)
        - ChatGPT
        - Gemini
        - Other
    validations:
      required: true
